apiVersion: apps/v1
kind: Deployment
metadata:
  name: parts-dbms-dev-deployment
  namespace: parts-direct-dev
  labels:
    app: parts-dbms-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parts-dbms-dev
  template:
    metadata:
      labels:
        app: parts-dbms-dev
    spec:
      containers:
        - name: parts-dbms-dev-container
          image: dwilson2547/parts-direct-dbms:2.3
          ports:
          - containerPort: 8080
          resources:
            limits:
              cpu: 4
              memory: 20Gi
          env:
          - name: save_dir
            value: /data/pvc-c9c3aff2-5e41-46eb-bce5-3192026b2cb5
          - name: db_url
            valueFrom:
              secretKeyRef:
                name: mysql-dev-creds
                key: dburl
          - name: db_pass
            valueFrom:
              secretKeyRef:
                name: mysql-dev-creds
                key: password
          - name: db_user
            valueFrom:
              secretKeyRef:
                name: mysql-dev-creds
                key: username
          - name: BUCKET_SECRET
            valueFrom:
              secretKeyRef:
                name: bucket-creds
                key: secret
          - name: BUCKET_URL
            valueFrom:
              secretKeyRef:
                name: bucket-creds
                key: url
          - name: BUCKET_ACCESS
            valueFrom:
              secretKeyRef:
                name: bucket-creds
                key: access
          volumeMounts:
          - name: nfs-vol
            mountPath: /data
      volumes:
        - name: nfs-vol
          nfs:
            server: 192.168.0.5
            path: /mnt/user/kube-storage
---
apiVersion: v1
kind: Service
metadata:
  name: parts-dbms-dev-entrypoint
  namespace: parts-direct-dev
spec:
  type: NodePort
  selector:
    app: parts-dbms-dev
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
