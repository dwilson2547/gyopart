<div class="container">
  <div class="row">
    <app-header></app-header>
  </div>

      <app-sidebar></app-sidebar>
    </div>
    <div class="col-md-9">
      <div class="pad-top">
        <mat-accordion class="example-headers-align">
          <mat-expansion-panel [expanded]="step === 0" id="part-selection" (opened)="setStep(0)" hideToggle>
            <mat-expansion-panel-header>
              <mat-panel-title>
                Part Selection
              </mat-panel-title>
            </mat-expansion-panel-header>

            <app-part-search></app-part-search>

            <mat-action-row>
              <button mat-button color="primary" (click)="nextStep()">Next</button>
            </mat-action-row>
          </mat-expansion-panel>

          <mat-expansion-panel [expanded]="step === 1" id="part-info" (opened)="setStep(1)" hideToggle>
            <mat-expansion-panel-header>
              <mat-panel-title>
                Part Info / Compatability
              </mat-panel-title>
            </mat-expansion-panel-header>

            <app-part-info></app-part-info>

            <mat-action-row>
              <button mat-button color="warn" (click)="prevStep()">Previous</button>
              <!-- <button mat-button color="primary" (click)="nextStep()">Next</button> -->
            </mat-action-row>
          </mat-expansion-panel>

          </mat-expansion-panel-header>

      </div>
    </div>
  </div>
</div>

    <p>Please Selecte a car to browse parts</p>
  </div>
</ng-template>
